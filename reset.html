<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nueva contraseña</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: darkgrey;
      height: 100vh;
    }

    .card {
      backdrop-filter: blur(10px);
      background: rgba(240, 240, 240, 0.95);
      border-radius: 15px;
    }

    .btn-custom {
      background-color: #28a745;
      color: white;
    }

    .btn-custom:hover {
      background-color: #218838;
    }

    h3 {
      color: #28a745;
    }

    a {
      color: #28a745;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="container d-flex justify-content-end align-items-center vh-100">

  <div class="card p-4 shadow me-5" style="width: 350px;">
    
    <h3 class="text-center mb-4">Nueva contraseña</h3>

    <input type="text" id="token" class="form-control mb-3" placeholder="Código" autocomplete="off">

    <input type="password" id="password" class="form-control mb-3" placeholder="Nueva contraseña">

    <button onclick="reset()" class="btn btn-custom w-100 mb-3">
      Cambiar contraseña
    </button>

    <p id="mensaje" class="text-center text-danger"></p>

    <hr>

    <div class="text-center">
      <a href="login.html">Volver al login</a>
    </div>

  </div>

</div>

<script>
async function reset() {
  const token = document.getElementById("token").value;
  const nuevaPassword = document.getElementById("password").value;
  const email = localStorage.getItem("emailReset");

  const res = await fetch("http://localhost:3000/reset-password", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, token, nuevaPassword })
  });

  const data = await res.json();

  if (data.mensaje === "Contraseña actualizada") {
    window.location.href = "login.html";
  } else {
    document.getElementById("mensaje").innerText = data.mensaje;
  }
}
</script>

</body>
</html>
