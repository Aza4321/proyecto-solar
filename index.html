<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: url('https://i2.wp.com/medioambienteynaturaleza.com/wp-content/uploads/2015/08/Fondos-de-pantalla-de-naturaleza-ag.jpg?resize=1920%2C1080&ssl=1') no-repeat center center/cover;
      height: 100vh;
    }

    .card {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.9);
      border-radius: 15px;
    }

    .btn-custom {
      background-color: #28a745;
      color: white;
    }

    .btn-custom:hover {
      background-color: #218838;
    }

    a {
      color: #28a745;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    h3 {
      color: #28a745;
    }
  </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="card p-4 shadow" style="width: 350px;">
    
    <h3 class="text-center mb-4">Iniciar sesión</h3>

    <input type="email" id="email" class="form-control mb-3" placeholder="Correo">
    
    <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">

    <button onclick="login()" class="btn btn-custom w-100 mb-3">
      Entrar
    </button>

    <p id="mensaje" class="text-danger text-center"></p>

    <hr>

    <div class="text-center">
      <p class="mb-1">
        ¿No tienes cuenta? 
        <a href="registro.html">Regístrate</a>
      </p>

      <a href="recuperar.html">¿Olvidaste tu contraseña?</a>
    </div>

  </div>

</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("http://localhost:3000/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.mensaje.includes("Login")) {
    window.location.href = "inde.html";
  } else {
    document.getElementById("mensaje").innerText = data.mensaje;
  }
}
</script>

</body>
</html>
